name: Wakust Auto Update

on:
  schedule:
    # 毎日17:00 JSTに実行（UTC 08:00 = JST 17:00）
    - cron: '0 8 * * *'
    # 毎日23:45 JSTに実行（UTC 14:45 = JST 23:45）回遊ラベル切替 ※0:00だと遅延するため前倒し
    - cron: '45 14 * * *'
  workflow_dispatch:
    inputs:
      midnight_mode:
        description: '0時モードで実行する'
        type: boolean
        default: false
      calendar_only:
        description: 'カレンダーのみ更新する'
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run wakust auto update
        env:
          WAKUST_EMAIL: ${{ secrets.WAKUST_EMAIL }}
          WAKUST_PASSWORD: ${{ secrets.WAKUST_PASSWORD }}
          MIDNIGHT_RUN: ${{ (github.event.schedule == '45 14 * * *' || inputs.midnight_mode == true) && '1' || '0' }}
          CALENDAR_ONLY: ${{ inputs.calendar_only == true && '1' || '0' }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python wakust_auto_update.py

      - name: Commit and push logs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ || true
          git diff --cached --quiet || git commit -m "📊 PVログ自動更新 $(date -u +%Y-%m-%d)"
          git push || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wakust-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
