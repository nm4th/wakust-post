name: Wakust Auto Update

on:
  schedule:
    # 毎日20:00 JSTに実行（UTC 11:00 = JST 20:00）
    - cron: '0 11 * * *'
    # 毎日0:00 JSTに実行（UTC 15:00 = JST 0:00）回遊ラベル切替
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      midnight_mode:
        description: '0時モードで実行する'
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run wakust auto update
        env:
          WAKUST_EMAIL: ${{ secrets.WAKUST_EMAIL }}
          WAKUST_PASSWORD: ${{ secrets.WAKUST_PASSWORD }}
          MIDNIGHT_RUN: ${{ (github.event.schedule == '0 15 * * *' || inputs.midnight_mode == true) && '1' || '' }}
        run: python wakust_auto_update.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wakust-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
