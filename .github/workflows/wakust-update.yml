name: Wakust Auto Update

on:
  schedule:
    # 毎日16:00 JSTに1回実行（UTC 7:00 = JST 16:00）
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run wakust auto update
        env:
          WAKUST_EMAIL: ${{ secrets.WAKUST_EMAIL }}
          WAKUST_PASSWORD: ${{ secrets.WAKUST_PASSWORD }}
        run: python wakust_auto_update.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wakust-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
