name: Wakust Auto Update

on:
  schedule:
    # 毎日4回実行（JST = UTC+9）
    - cron: '0 15 * * *'   # 0:00 JST → スロット0（全記事更新＋再投稿）
    - cron: '0 11 * * *'   # 20:00 JST → スロット1（再投稿のみ）
    - cron: '0 3 * * *'    # 12:00 JST → スロット2（再投稿のみ）
    - cron: '0 23 * * *'   # 8:00 JST → スロット3（再投稿のみ）
  workflow_dispatch:
    inputs:
      slot:
        description: 'スロット番号 (0=0:00, 1=20:00, 2=12:00, 3=8:00, auto=自動判定)'
        default: 'auto'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run wakust auto update
        env:
          WAKUST_EMAIL: ${{ secrets.WAKUST_EMAIL }}
          WAKUST_PASSWORD: ${{ secrets.WAKUST_PASSWORD }}
        run: python wakust_auto_update.py --slot ${{ github.event.inputs.slot || 'auto' }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wakust-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
